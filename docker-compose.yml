services:
  db:
    image: postgres:15
    container_name: odoo_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U odoo" ]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo:
    build: .
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - .:/app
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
      - odoo-web-data:/root/.local/share/Odoo
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    restart: always

volumes:
  odoo-db-data:
  odoo-web-data:
